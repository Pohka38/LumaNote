<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumaNote</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>LumaNote</h1>
    <p class="subtitle">Твой проект начинается с первого шага.</p>

    <div class="card">
      <h2>Первая страница</h2>
      <p>
        Это стартовая версия проекта. Постепенно здесь появятся новые возможности.
        Мы постоянно работаем над созданием чего то нового.
      </p>
      <button id="startBtn">Войти</button>
      <p id="message"></p>
    </div>
  </div>
<script>
  const startBtn = document.getElementById("startBtn");
  const message = document.getElementById("message");

  startBtn.addEventListener("click", function () {
    message.textContent = "Добро пожаловать в LumaNote. Мы начинаем создавать что-то большое.";
  });
</script>
</body>
</html>
