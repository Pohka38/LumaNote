<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumaNote</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
  <div class="logo">LumaNote</div>
  <div class="clock" id="clock">00:00:00</div>
</header>
  <div class="container">
    <h1>LumaNote</h1>
    <p class="subtitle">Твой проект начинается с первого шага.</p>

    <div class="card">
      <h2>Первая страница</h2>
      <p>
        Это стартовая версия проекта. Постепенно здесь появятся новые возможности.
        Мы постоянно работаем над созданием чего то нового.
      </p>
      <button id="startBtn">Войти</button>
      <p id="message"></p>
      <input type="text" id="noteInput" placeholder="Напиши свою первую заметку..." />
      <button id="saveNoteBtn">Сохранить заметку</button>
      <p id="noteResult"></p>
    </div>
  </div>
<script>
  const startBtn = document.getElementById("startBtn");
  const message = document.getElementById("message");

  startBtn.addEventListener("click", function () {
    message.textContent = "Ты вошёл в проект будущего";
  });
const noteInput = document.getElementById("noteInput");
const saveNoteBtn = document.getElementById("saveNoteBtn");
const noteResult = document.getElementById("noteResult");

saveNoteBtn.addEventListener("click", function () {
  const userText = noteInput.value;

  if (userText === "") {
    noteResult.textContent = "Сначала напиши заметку";
  } else {
    noteResult.textContent = "Твоя заметка: " + userText;
  }
});
    const clock = document.getElementById("clock");

function updateClock() {
  const now = new Date();

  const hours = String(now.getHours()).padStart(2, "0");
  const minutes = String(now.getMinutes()).padStart(2, "0");
  const seconds = String(now.getSeconds()).padStart(2, "0");

  clock.textContent = `${hours}:${minutes}:${seconds}`;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
